# Warehouse identification
warehouse.id=warehouse-1

# Sensor port mappings — add a new sensor by adding a block here
warehouse.sensors.temperature.port=3344
warehouse.sensors.temperature.type=TEMPERATURE
warehouse.sensors.temperature.value-kind=scalar
warehouse.sensors.temperature.unit=°C

warehouse.sensors.humidity.port=3355
warehouse.sensors.humidity.type=HUMIDITY
warehouse.sensors.humidity.value-kind=scalar
warehouse.sensors.humidity.unit=%

warehouse.sensors.gps.port=3366
warehouse.sensors.gps.type=LOCATION
warehouse.sensors.gps.value-kind=location

warehouse.sensors.hvac.port=3377
warehouse.sensors.hvac.type=HVAC_STATUS
warehouse.sensors.hvac.value-kind=composite

# Kafka outgoing channel
mp.messaging.outgoing.sensor-measurements-out.connector=smallrye-kafka
mp.messaging.outgoing.sensor-measurements-out.topic=sensor-measurements
mp.messaging.outgoing.sensor-measurements-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka bootstrap
kafka.bootstrap.servers=localhost:9092

# Quarkus
quarkus.application.name=warehouse-service
