# Thresholds (sensor type name → max allowed scalar value)
# Only scalar sensors can have thresholds; non-scalar types are silently skipped.
threshold.sensors.TEMPERATURE=35.0
threshold.sensors.HUMIDITY=50.0

# Kafka incoming channel
mp.messaging.incoming.sensor-measurements-in.connector=smallrye-kafka
mp.messaging.incoming.sensor-measurements-in.topic=sensor-measurements
mp.messaging.incoming.sensor-measurements-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.sensor-measurements-in.auto.offset.reset=earliest
mp.messaging.incoming.sensor-measurements-in.group.id=central-monitoring

# Kafka bootstrap
kafka.bootstrap.servers=localhost:9092

# Quarkus
quarkus.application.name=central-monitoring-service
